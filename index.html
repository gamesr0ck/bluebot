<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluebot - Action Platformer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-layer">
            <div id="health-bar-container">
                <div id="health-bar"></div>
            </div>
            <div id="instructions">
                Arrows: Move & Jump | X: Shoot | C: Dash
                <br><br>
                <a href="editor.html" style="color: #00aaff; text-decoration: none; border: 1px solid #00aaff; padding: 5px; background: rgba(0,0,0,0.5);">Open Level Editor</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
